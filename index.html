<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Prayer Times</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Prayer Times</h1>
    <div class="d-flex align-items-center mb-3 justify-content-between">
        <div class="e-filters d-flex">
            <input type="date" id="dateInput dt-1" class="time-filter form-control mb-3">
            <input type="date" id="dateInput dt-2" class="time-filter form-control mb-3">
        </div>
        <div>
            <button id="fetchButton" class="btn btn-primary mb-3">Fetch Prayer Times</button>
        </div>
    </div>
    <table class="table">
  <thead>
    <tr>
      <th scope="col">Date</th>
      <th scope="col">Imsak</th>
      <th scope="col">Fajr</th>
      <th scope="col">Sunrise</th>
      <th scope="col">Dhuhr</th>
      <th scope="col">Asr</th>
      <th scope="col">Maghrib</th>
      <th scope="col">Isha</th>
    </tr>
  </thead>
  <tbody>
    <!-- Table rows will be populated by JavaScript -->
  </tbody>
</table>
    </div>  
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="./assets/js/script.js"></script>
</html>
